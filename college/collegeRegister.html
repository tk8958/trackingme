<!DOCTYPE html>
<html>
<head>
    <title>College Register</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            padding:15px;
        }

        .container{
            width:100%;
            max-width:420px;
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(15px);
            padding:35px 25px;
            border-radius:18px;
            box-shadow:0 15px 40px rgba(0,0,0,0.25);
            text-align:center;
        }

        h2{
            color:white;
            margin-bottom:25px;
            font-size:26px;
            font-weight:600;
        }

        input{
            width:100%;
            padding:14px;
            margin:12px 0;
            border:none;
            border-radius:10px;
            outline:none;
            font-size:16px;
        }

        input::placeholder{
            color:#777;
            font-size:14px;
        }

        button{
            width:100%;
            padding:14px;
            margin-top:12px;
            border:none;
            border-radius:10px;
            font-size:16px;
            cursor:pointer;
            font-weight:600;
            transition:0.3s;
        }

        button:first-of-type{
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white;
        }

        button:last-of-type{
            background:linear-gradient(135deg,#ff9966,#ff5e62);
            color:white;
        }

        button:hover{
            transform:translateY(-2px);
            box-shadow:0 6px 18px rgba(0,0,0,0.3);
        }

        p, body > div > text{
            margin-top:15px;
            color:white;
            font-size:15px;
        }

        /* MOBILE IMPROVEMENT */
        @media(max-width:500px){
            .container{
                padding:30px 20px;
                border-radius:15px;
            }

            h2{
                font-size:22px;
            }

            input{
                font-size:16px;
                padding:15px;
            }

            button{
                font-size:16px;
                padding:15px;
            }
        }

    </style>
</head>

<body>

<div class="container">

<h2>College Registration</h2>

<input type="text" id="collegeName" placeholder="College Name"><br><br>
<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="registerCollege()">Register</button>

<br><br>
Already registered?
<button onclick="window.location.href='collegeLogin.html'">Login</button>

</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<!-- Firebase Config -->
<script src="../admin/firebase-config.js"></script>

<!-- ✅ Razorpay BEFORE your JS -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<!-- Logic -->
<script src="college.js"></script>

</body>
</html>
